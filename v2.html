<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="/images/sachinpro.png">
  <title>Sachin's || Linktree </title>
  <meta name="theme-color" content="#06c1db">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 400px;
      text-align: center;
      padding: 30px 20px;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 2px solid #fff;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 24px;
      margin: 10px 0;
    }

    .bio {
      font-size: 14px;
      margin-bottom: 30px;
      color: #ccc;
    }

    .link, .share-btn {
      display: block;
      background-color: #111;
      color: #fff;
      text-decoration: none;
      padding: 14px;
      margin: 10px 0;
      border: 1px solid #fff;
      border-radius: 10px;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .link:hover, .share-btn:hover {
      background-color: #fff;
      color: #000;
    }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #555;
    }

    .message {
      margin-top: 10px;
      font-size: 13px;
      color: lightgreen;
      display: none;
    }
    a{
        color: #fff;
        text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="/images/sachinpro.png" alt="Profile Picture" class="avatar" />
    <a href="https://www.instagram.com/_sachin_2006_01/"><h1>@_sachin_2006_01</h1></a>
    <p class="bio">Developer • Creative • Minimal • Connected</p>

    <a class="link" href="https://sachinpro.surge.sh/" target="_blank">Portfolio</a>
    <a class="link" href="https://github.com/CRYOMOCO143" target="_blank">GitHub</a>
    <a class="link" href="https://www.linkedin.com/in/sachin-patel-b5106a295/" target="_blank">LinkedIn</a>
    <a class="link" href="https://www.facebook.com/sachin148921/" target="_blank">Facebook</a>
    <a class="link" href="https://www.facebook.com/sachin148921/" target="_blank">Twitter (X)</a>
    <a class="link" href="https://www.instagram.com/_sachin_2006_01/" target="_blank">Instagram</a>
    <a class="link" href="https://sachinsoft.surge.sh/" target="_blank">Applications</a>
    <a class="link" href="https://sachinsoft.surge.sh/Smart_Cheat_Website" target="_blank">Free Fire Mods</a>
    <a class="link" href="mailto:sachinpatel34241@gmail.com">Email</a>

    <!-- Share Button -->
    <div class="share-btn" onclick="shareLink()">🔗 Share My Linktree</div>
    <div class="message" id="copyMessage">Link copied to clipboard!</div>

    <div class="footer">
      &copy; 2025 by Sachin Patel {Updated on 11-04-2025.}
    </div>
  </div>

  <script>
    function shareLink() {
      const shareUrl = "https://snlink.surge.sh"; 
      navigator.clipboard.writeText(shareUrl).then(() => {
        const msg = document.getElementById('copyMessage');
        msg.style.display = 'block';
        alert("👍Copied Succeed");
        setTimeout(() => {
          msg.style.display = 'none';
        }, 2000);
      });
    }
  </script>

</body>
</html>
