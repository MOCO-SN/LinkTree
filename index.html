<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="/images/sachinpro.png">
  <title>Sachin's || Linktree</title>
  <meta name="theme-color" content="#06c1db">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: url("https://images.unsplash.com/photo-1503264116251-35a269479413?auto=format&fit=crop&w=1920&q=80") no-repeat center center/cover;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      text-align: center;
      padding: 40px 25px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .avatar {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.6);
      margin-bottom: 15px;
      transition: transform 0.3s ease;
    }
    .avatar:hover {
      transform: scale(1.05);
    }

    h1 {
      font-size: 26px;
      margin: 12px 0;
      background: linear-gradient(90deg,#06c1db,#8a2be2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .bio {
      font-size: 15px;
      margin-bottom: 28px;
      color: #e0e0e0;
    }

    .link, .share-btn {
      display: block;
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      text-decoration: none;
      padding: 14px;
      margin: 12px 0;
      border-radius: 12px;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.3);
      transition: all 0.3s ease;
      font-weight: 500;
      font-size: 15px;
    }

    .link:hover, .share-btn:hover {
      background: rgba(255, 255, 255, 0.3);
      color: #000;
      box-shadow: 0 4px 15px rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #ddd;
    }

    .message {
      margin-top: 10px;
      font-size: 13px;
      color: #90ee90;
      display: none;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .container {
        max-width: 90%;
        padding: 30px 20px;
      }
      .avatar {
        width: 110px;
        height: 110px;
      }
      h1 {
        font-size: 22px;
      }
      .link, .share-btn {
        font-size: 14px;
        padding: 12px;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 15px;
      }
      .container {
        padding: 25px 15px;
        border-radius: 15px;
      }
      .avatar {
        width: 95px;
        height: 95px;
      }
      h1 {
        font-size: 20px;
      }
      .bio {
        font-size: 13px;
      }
      .link, .share-btn {
        font-size: 13px;
        padding: 10px;
        margin: 10px 0;
      }
      .footer {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/images/sachinpro.png" alt="Profile Picture" class="avatar" />
    <a href="https://www.instagram.com/_sachin_2006_01/"><h1>@_sachin_2006_01</h1></a>
    <p class="bio">Developer • Creative • Minimal • Connected</p>

    <a class="link" href="https://sachinpro.surge.sh/" target="_blank">🌐 Portfolio</a>
    <a class="link" href="https://github.com/MOCO-SN" target="_blank">💻 GitHub</a>
    <a class="link" href="https://www.linkedin.com/in/sachin-patel-b5106a295/" target="_blank">🔗 LinkedIn</a>
    <a class="link" href="https://www.facebook.com/sachin148921/" target="_blank">📘 Facebook</a>
    <a class="link" href="https://www.facebook.com/sachin148921/" target="_blank">🐦 Twitter (X)</a>
    <a class="link" href="https://www.instagram.com/_sachin_2006_01/" target="_blank">📸 Instagram</a>
    <a class="link" href="https://sachinsoft.surge.sh/" target="_blank">📱 Applications</a>
    <a class="link" href="https://sachinsoft.surge.sh/Smart_Cheat_Website" target="_blank">🔥 Free Fire Mods</a>
    <a class="link" href="mailto:sachinpatel34241@gmail.com">✉️ Email</a>

    <!-- Share Button -->
    <div class="share-btn" onclick="shareLink()">🔗 Share My Linktree</div>
    <div class="message" id="copyMessage">Link copied to clipboard!</div>

    <div class="footer">
      &copy; 2025 by Sachin Patel {Updated on 30-08-2025.}
    </div>
  </div>
~`
  <script>
    function shareLink() {
      const shareUrl = "https://snlink.surge.sh";
      navigator.clipboard.writeText(shareUrl).then(() => {
        const msg = document.getElementById('copyMessage');
        msg.style.display = 'block';
        setTimeout(() => {
          msg.style.display = 'none';
        }, 2000);
        alert("👍 Copied Successfully!");
      });
    }
  </script>
</body>
</html>
